# Development docker-compose with hot reload
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reception}
      POSTGRES_USER: ${POSTGRES_USER:-reception}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reception}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reception}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=postgres://${POSTGRES_USER:-reception}:${POSTGRES_PASSWORD:-reception}@db:5432/${POSTGRES_DB:-reception}
      - TELNYX_API_KEY=${TELNYX_API_KEY}
      - TELNYX_PUBLIC_KEY=${TELNYX_PUBLIC_KEY}
      - TELNYX_CONNECTION_ID=${TELNYX_CONNECTION_ID}
      - BASE_WEBHOOK_URL=${BASE_WEBHOOK_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - BASE_WEBHOOK_URL=${BASE_WEBHOOK_URL}
      - GOOGLE_CALENDAR_CREDENTIALS_PATH=/app/credentials.json
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
    volumes:
      - ./backend:/app/backend
      - ./manage.py:/app/manage.py:ro
      - ./credentials.json:/app/credentials.json:ro
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data:
