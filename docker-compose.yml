services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reception}
      POSTGRES_USER: ${POSTGRES_USER:-reception}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reception}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reception}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DATABASE_URL=postgres://${POSTGRES_USER:-reception}:${POSTGRES_PASSWORD:-reception}@db:5432/${POSTGRES_DB:-reception}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - FORWARD_PHONE_NUMBER=${FORWARD_PHONE_NUMBER}
      - VAPI_ASSISTANT_PHONE_NUMBER=${VAPI_ASSISTANT_PHONE_NUMBER}
      - VAPI_WEBHOOK_SECRET=${VAPI_WEBHOOK_SECRET}
      - GOOGLE_CALENDAR_CREDENTIALS_PATH=/app/credentials.json
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-primary}
    volumes:
      - ./credentials.json:/app/credentials.json:ro
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 --workers 2 backend.wsgi:application"

volumes:
  postgres_data:
